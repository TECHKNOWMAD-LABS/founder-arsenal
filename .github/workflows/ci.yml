name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Restrict GITHUB_TOKEN to read-only at workflow level. Jobs that need
# write access (publish, deploy) declare their own `permissions:` block.
permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov hypothesis ruff

      - name: Lint with ruff
        run: |
          ruff check src/ tests/ --ignore E501

      - name: Run tests with coverage
        run: |
          pytest -v --tb=short --cov=src --cov-report=term-missing --cov-fail-under=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: .coverage
